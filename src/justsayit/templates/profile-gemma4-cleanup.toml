# justsayit postprocess profile (commented-defaults form).
#
# Profile: gemma4-cleanup (recommended everyday default).
#
# Every key below is commented out — that means "use the shipped
# default from `templates/builtin-defaults.toml`". Uncomment a line and
# change the value to override it for this profile. Lines you don't
# touch keep tracking the canonical defaults, so future updates that
# tweak a default just work.
#
# Activate this profile from the tray's LLM submenu, or set in
# ~/.config/justsayit/state.toml:
#   [postprocess]
#   enabled = true
#   profile = "gemma4-cleanup"
#
# (See gemma4-fun.toml for an example with overrides uncommented.)
#
# Inference backend setup (with Vulkan GPU support):
#   CMAKE_ARGS="-DGGML_VULKAN=1" uv pip install llama-cpp-python
# Then run `justsayit setup-llm` to download a GGUF model.

# Backend: built-in llama-cpp-python loading a local GGUF.
# Defaults loaded from `templates/builtin-defaults.toml`.
base = "builtin"

# --- Override any builtin-defaults.toml value below ---------------------
# (Reference for the full list of overridable keys lives in the
# canonical defaults file — see `src/justsayit/templates/builtin-defaults.toml`.)

# Path to the GGUF model file. ~ is expanded.
# model_path = "~/.cache/justsayit/models/llm/gemma-4-E4B-it-Q4_K_M.gguf"

# HuggingFace source for auto-download via `justsayit setup-llm`.
# hf_repo = "unsloth/gemma-4-E4B-it-GGUF"
# hf_filename = "gemma-4-E4B-it-Q4_K_M.gguf"

# GPU layer offloading. -1 = all layers on GPU (fastest). 0 = CPU only.
# n_gpu_layers = -1

# Context window size in tokens.
# n_ctx = 4096

# Temperature. Keep very low (≤ 0.1) for deterministic cleanup.
# temperature = 0.08

# Hard cap on generated tokens.
# max_tokens = 4096

# User message template. {text} is replaced with the raw transcription.
# user_template = "{text}"

# Regex (re.DOTALL) applied to the LLM output before paste, but NOT
# before display in the overlay. Default strips Gemma's thinking-channel
# block. Set to "" if you swap to a system prompt without `<|think|>`.
# paste_strip_regex = '<\|channel>thought(.*?)<channel\|>'

# System prompt. Bare names resolve against the packaged
# `src/justsayit/prompts/` directory; paths with a slash (or ~) are
# loaded as-is. Override here to point at your own .md file.
# system_prompt_file = "cleanup_local.md"

# Inline override (takes precedence over system_prompt_file). Useful
# for one-off tweaks without creating a new .md file.
# system_prompt = """
# You are a transcription cleanup assistant. ...
# """

# Extra text appended to the resolved system prompt (joined with a
# blank line). Handy when you want the default prompt plus a small
# addition without copying the whole prompt into a new file.
# append_to_system_prompt = "Always reply in English."

# Extra kwargs forwarded into the chat template. Default already enables
# Qwen 3.5's thinking mode (off in its default template) and is a no-op
# for Gemma. Override here to opt out for this profile, or to add other
# template-specific switches.
# chat_template_kwargs = { enable_thinking = true }

# User-context lives in a shared sidecar so it's preserved across
# profile updates: ~/.config/justsayit/context.toml. Uncomment to set
# per-profile context that overrides the sidecar:
# context = """
# Name: Jane Doe
# ...
# """
