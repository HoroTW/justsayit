#   and any project / proper-noun spellings the model gets wrong.
# - Don't put secrets here.
#
# Example:
#   context = """
#   Name: Jane Doe
#   Country: Germany
#   Languages: German (native), English (fluent), Python
#   Notes: software engineer; often dictates code-related text.
#   """

